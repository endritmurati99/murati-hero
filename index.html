<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MURATI KFZ — Hero</title>
<style>
  :root{
    --blau:#1763d8;
    --blau-tief:#0c3b87;
    --hell:#eef3fb;
    --text:#0f2038;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:var(--hell);
    overflow:hidden;
  }
  /* 3D-Hintergrund */
  #scene{
    position:fixed; inset:0; z-index:0; display:block;
  }
  /* heller Verlauf ueber die Szene fuer Lesbarkeit */
  .veil{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(238,243,251,.35) 0%, rgba(238,243,251,0) 35%, rgba(238,243,251,.55) 100%);
  }
  /* Hero-Inhalt */
  .hero{
    position:relative; z-index:2;
    height:100%;
    display:flex; flex-direction:column; justify-content:center;
    padding:6vw clamp(20px,7vw,120px);
  }
  .badge{
    display:inline-flex; align-items:center; gap:10px;
    width:max-content;
    background:#fff; border:1px solid #d6e2f4;
    border-radius:999px; padding:8px 16px;
    box-shadow:0 6px 24px rgba(23,99,216,.12);
    font-weight:600; font-size:14px; letter-spacing:.02em;
    color:var(--blau-tief);
  }
  .badge .ring{
    width:18px; height:18px; border-radius:50%;
    border:2px solid var(--blau);
  }
  h1{
    margin-top:22px;
    font-size:clamp(40px,7vw,92px);
    line-height:.98; font-weight:800; letter-spacing:-.02em;
    color:var(--text);
  }
  h1 span{ color:var(--blau); }
  p.sub{
    margin-top:18px; max-width:560px;
    font-size:clamp(16px,2vw,20px); line-height:1.5; color:#3a4d68;
  }
  .cta{
    margin-top:34px; display:flex; gap:14px; flex-wrap:wrap;
  }
  .btn{
    appearance:none; border:0; cursor:pointer;
    font-weight:700; font-size:16px;
    padding:15px 26px; border-radius:12px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform:translateY(-2px); }
  .btn-primary{
    background:var(--blau); color:#fff;
    box-shadow:0 10px 26px rgba(23,99,216,.35);
  }
  .btn-ghost{
    background:#fff; color:var(--blau-tief);
    border:1px solid #cfdcf2;
  }
  /* Logo-Platzhalter oben links: hier Logo 1 (PNG/SVG) einsetzen */
  .brand{
    position:fixed; top:22px; left:clamp(20px,7vw,120px); z-index:3;
    display:flex; align-items:center; gap:12px;
    font-weight:800; font-size:20px; color:var(--text);
  }
  .brand .logo{
    width:40px; height:40px; border-radius:10px;
    background:linear-gradient(135deg,var(--blau),var(--blau-tief));
    display:grid; place-items:center; color:#fff; font-weight:900;
  }
  .hint{
    position:fixed; bottom:14px; right:18px; z-index:3;
    font-size:12px; color:#6b7d97; background:rgba(255,255,255,.7);
    padding:6px 10px; border-radius:8px;
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="veil"></div>

  <div class="brand">
    <div class="logo">M</div>
    <div>MURATI&nbsp;KFZ</div>
  </div>

  <section class="hero">
    <span class="badge"><span class="ring"></span> KFZ-Meisterbetrieb</span>
    <h1>Dein Auto.<br><span>Unsere Leidenschaft.</span></h1>
    <p class="sub">Wartung, Reparatur und Service fuer alle Marken. Ehrlich, schnell und transparent. Termin in unter 60 Sekunden anfragen.</p>
    <div class="cta">
      <button class="btn btn-primary">Termin anfragen</button>
      <button class="btn btn-ghost">Leistungen ansehen</button>
    </div>
  </section>

  <div class="hint">Three.js Hintergrund · Logo 1 oben links einsetzen</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas = document.getElementById('scene');
  if(!window.THREE){ console.warn('three.js nicht geladen'); return; }

  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xeef3fb, 22, 60);

  const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 200);
  camera.position.set(6.2, 2.6, 7.4);
  camera.lookAt(0, 0.9, 0);

  // Licht
  const hemi = new THREE.HemisphereLight(0xffffff, 0xcdd9ec, 0.95);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(8, 12, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 40;
  sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
  sun.shadow.camera.top = 14; sun.shadow.camera.bottom = -14;
  scene.add(sun);

  // Strasse (scrollende Textur simuliert Fahrt)
  const roadCanvas = document.createElement('canvas');
  roadCanvas.width = 64; roadCanvas.height = 256;
  const rctx = roadCanvas.getContext('2d');
  rctx.fillStyle = '#cfd8e6'; rctx.fillRect(0,0,64,256);
  rctx.fillStyle = '#ffffff';
  for(let y=10;y<256;y+=64){ rctx.fillRect(30, y, 4, 34); } // Mittelstreifen
  const roadTex = new THREE.CanvasTexture(roadCanvas);
  roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
  roadTex.repeat.set(2, 14);
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 120),
    new THREE.MeshStandardMaterial({ map:roadTex, roughness:.95 })
  );
  road.rotation.x = -Math.PI/2;
  road.receiveShadow = true;
  scene.add(road);

  // Auto (A4-artige Limousine, prozedural)
  const car = new THREE.Group();
  const paint = new THREE.MeshStandardMaterial({ color:0x1763d8, metalness:.55, roughness:.35 });
  const glass = new THREE.MeshStandardMaterial({ color:0x0c2545, metalness:.3, roughness:.1, transparent:true, opacity:.85 });
  const dark  = new THREE.MeshStandardMaterial({ color:0x101723, metalness:.4, roughness:.5 });
  const chrome= new THREE.MeshStandardMaterial({ color:0xd7e0ee, metalness:.9, roughness:.25 });

  // Unterbau / Karosserie (3-Box)
  const lower = new THREE.Mesh(new THREE.BoxGeometry(4.4, .7, 1.85), paint);
  lower.position.y = .62; lower.castShadow = true; car.add(lower);

  // Motorhaube + Kofferraum Schultern
  const shoulder = new THREE.Mesh(new THREE.BoxGeometry(4.6, .42, 1.78), paint);
  shoulder.position.y = 1.0; shoulder.castShadow = true; car.add(shoulder);

  // Greenhouse / Kabine (kuerzer, eingerueckt)
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.3, .62, 1.6), paint);
  cabin.position.set(-.15, 1.42, 0); cabin.castShadow = true; car.add(cabin);
  const greenhouse = new THREE.Mesh(new THREE.BoxGeometry(2.15, .5, 1.5), glass);
  greenhouse.position.set(-.15, 1.45, 0); car.add(greenhouse);

  // Single-Frame Grill (Audi-Cue) + vier Ringe
  const grille = new THREE.Mesh(new THREE.BoxGeometry(.12, .55, 1.0), dark);
  grille.position.set(2.28, .78, 0); car.add(grille);
  for(let i=0;i<4;i++){
    const ring = new THREE.Mesh(new THREE.TorusGeometry(.11, .025, 8, 24), chrome);
    ring.rotation.y = Math.PI/2;
    ring.position.set(2.33, .8, -.33 + i*.22);
    car.add(ring);
  }
  // Scheinwerfer (leicht leuchtend)
  const head = new THREE.MeshStandardMaterial({ color:0xeaf2ff, emissive:0x9fc2ff, emissiveIntensity:.7 });
  [-.6,.6].forEach(z=>{
    const h = new THREE.Mesh(new THREE.BoxGeometry(.12,.16,.4), head);
    h.position.set(2.28, .92, z); car.add(h);
  });
  // Rueckleuchten
  const tail = new THREE.MeshStandardMaterial({ color:0xff3b30, emissive:0xff2a20, emissiveIntensity:.5 });
  [-.6,.6].forEach(z=>{
    const t = new THREE.Mesh(new THREE.BoxGeometry(.1,.16,.4), tail);
    t.position.set(-2.3, .92, z); car.add(t);
  });

  // Raeder (drehend)
  const wheels = [];
  const tyreGeo = new THREE.CylinderGeometry(.46,.46,.34,28);
  const tyreMat = new THREE.MeshStandardMaterial({ color:0x14181f, roughness:.85 });
  const rimGeo = new THREE.CylinderGeometry(.27,.27,.36,7);
  const wheelPos = [[1.45,.9],[1.45,-.9],[-1.45,.9],[-1.45,-.9]];
  wheelPos.forEach(([x,z])=>{
    const w = new THREE.Group();
    const tyre = new THREE.Mesh(tyreGeo, tyreMat); tyre.rotation.x = Math.PI/2; tyre.castShadow = true;
    const rim = new THREE.Mesh(rimGeo, chrome); rim.rotation.x = Math.PI/2;
    w.add(tyre); w.add(rim);
    w.position.set(x, .46, z);
    car.add(w); wheels.push(w);
  });

  car.position.y = 0;
  scene.add(car);

  // Animation
  let t = 0;
  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize); resize();

  function tick(){
    t += 0.016;
    roadTex.offset.y -= 0.045;                 // Strasse fliesst -> Fahrt
    wheels.forEach(w => w.rotation.x += 0.32); // Raeder drehen
    car.position.y = Math.sin(t*2.2)*0.015;    // leichtes Federn
    car.rotation.z = Math.sin(t*1.3)*0.006;    // minimale Neigung
    // sanfter Kamera-Schwenk
    camera.position.x = 6.2 + Math.sin(t*0.25)*0.6;
    camera.position.z = 7.4 + Math.cos(t*0.25)*0.4;
    camera.lookAt(0, 0.95, 0);
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
